name: API CI

on:
  push:
    paths:
      - "apps/api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "apps/api/**"

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: matrimonial_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        working-directory: apps/api
        run: dotnet restore

      - name: Build
        working-directory: apps/api
        run: dotnet build --no-restore -c Release

      - name: Test
        working-directory: apps/api
        run: dotnet test --no-build -c Release --verbosity normal
        env:
          ConnectionStrings__Postgres: "Host=localhost;Port=5432;Database=matrimonial_test;Username=test;Password=test"
